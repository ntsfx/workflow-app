<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFlow — Project Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f12;--surface:#17171c;--surface2:#1e1e25;--surface3:#25252f;
  --border:#2e2e3a;--border2:#3a3a48;
  --text:#e8e8f0;--text2:#9090a8;--text3:#5a5a72;
  --accent:#7c6af7;--accent2:#9d8fff;--accent-bg:rgba(124,106,247,0.12);
  --green:#34d399;--amber:#fbbf24;--red:#f87171;--blue:#60a5fa;--pink:#f472b6;
  --radius:10px;--radius-sm:6px;
  font-family:'DM Sans',sans-serif;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;overflow:hidden}
#root{display:flex;height:100vh}

/* SIDEBAR */
.sidebar{width:232px;min-width:232px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column}
.logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-mark{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-mark svg{width:16px;height:16px;fill:white}
.logo-text{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.sb-section{padding:12px 14px 4px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text3)}
.sb-item{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:var(--radius-sm);cursor:pointer;color:var(--text2);font-size:13.5px;margin:1px 6px;transition:all 0.14s;position:relative}
.sb-item:hover{background:var(--surface2);color:var(--text)}
.sb-item.active{background:var(--accent-bg);color:var(--accent2)}
.sb-item .ic{width:15px;height:15px;flex-shrink:0;opacity:0.7}
.sb-item.active .ic{opacity:1}
.sb-badge{margin-left:auto;background:var(--surface3);color:var(--text3);font-size:10px;font-weight:500;padding:1px 6px;border-radius:20px;font-family:'DM Mono',monospace}
.sb-item.active .sb-badge{background:var(--accent-bg);color:var(--accent2)}
.pdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-footer{margin-top:auto;border-top:1px solid var(--border);padding:10px 8px}
.user-row{display:flex;align-items:center;gap:9px;padding:7px 8px;border-radius:var(--radius-sm);cursor:pointer}
.user-row:hover{background:var(--surface2)}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:white;flex-shrink:0}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{height:54px;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:10px;background:var(--surface);flex-shrink:0}
.topbar-title{font-size:16px;font-weight:600;letter-spacing:-0.3px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:6px 13px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:none;transition:all 0.14s;font-family:inherit;white-space:nowrap}
.btn svg{width:14px;height:14px;flex-shrink:0}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-primary{background:var(--accent);color:white}
.btn-primary:hover{background:var(--accent2)}
.btn-danger{background:transparent;color:var(--red);border:1px solid rgba(248,113,113,0.25)}
.btn-danger:hover{background:rgba(248,113,113,0.08)}
.view-tabs{display:flex;gap:2px;background:var(--surface2);padding:3px;border-radius:var(--radius-sm)}
.v-tab{padding:4px 11px;border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;color:var(--text2);transition:all 0.14s;user-select:none}
.v-tab.active{background:var(--surface3);color:var(--text)}
.search-wrap{display:flex;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:5px 11px}
.search-wrap input{background:transparent;border:none;outline:none;color:var(--text);font-size:13px;font-family:inherit;width:130px}
.search-wrap input::placeholder{color:var(--text3)}

/* CONTENT */
.content{flex:1;overflow:hidden;display:flex;flex-direction:column}

/* BOARD */
.board{display:flex;gap:14px;padding:18px;overflow-x:auto;height:100%;align-items:flex-start}
.board::-webkit-scrollbar{height:6px}
.board::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.col{min-width:268px;width:268px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);display:flex;flex-direction:column;max-height:calc(100vh - 130px)}
.col-hdr{padding:12px 14px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.col-name{font-size:13px;font-weight:600;flex:1}
.col-cnt{font-size:10.5px;color:var(--text3);background:var(--surface2);padding:1px 6px;border-radius:10px;font-family:'DM Mono',monospace}
.col-body{padding:4px 8px 6px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:5px}
.col-body::-webkit-scrollbar{width:3px}
.col-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 12px;cursor:pointer;transition:border-color 0.14s,background 0.14s}
.card:hover{border-color:var(--border2);background:var(--surface3)}
.card-title{font-size:13px;font-weight:500;line-height:1.4;margin-bottom:8px}
.card-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.tag{display:inline-flex;font-size:10.5px;font-weight:500;padding:2px 7px;border-radius:20px}
.pdot-sm{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.card-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.av-sm{width:20px;height:20px;border-radius:50%;font-size:8.5px;font-weight:600;display:flex;align-items:center;justify-content:center;color:white;flex-shrink:0}
.due{font-size:11px;color:var(--text3)}
.due.late{color:var(--red)}
.prog{height:3px;background:var(--surface3);border-radius:2px;overflow:hidden;margin-top:8px}
.prog-fill{height:100%;border-radius:2px;background:var(--green);transition:width 0.3s}
.add-card{display:flex;align-items:center;gap:6px;padding:7px 14px;color:var(--text3);font-size:12.5px;cursor:pointer;transition:all 0.14s;border-radius:var(--radius-sm);margin:2px 6px 6px}
.add-card:hover{background:var(--surface2);color:var(--text2)}
.add-col{min-width:230px;width:230px;border:1.5px dashed var(--border);border-radius:var(--radius);padding:22px 16px;display:flex;align-items:center;justify-content:center;gap:8px;color:var(--text3);cursor:pointer;font-size:13px;transition:all 0.14s;align-self:flex-start}
.add-col:hover{border-color:var(--border2);color:var(--text2);background:var(--surface)}

/* LIST */
.list-view{padding:18px;overflow-y:auto;height:100%}
.list-hdr{display:flex;padding:6px 12px 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3)}
.lg{margin-bottom:18px}
.lg-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm) var(--radius-sm) 0 0;cursor:pointer}
.lg-hdr-title{font-size:13px;font-weight:600;flex:1}
.lrow{display:flex;align-items:center;padding:9px 12px;background:var(--surface);border:1px solid var(--border);border-top:none;cursor:pointer;transition:background 0.12s}
.lrow:hover{background:var(--surface2)}
.lrow:last-child{border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.lcheck{width:16px;height:16px;border:1.5px solid var(--border2);border-radius:4px;flex-shrink:0;margin-right:12px;display:flex;align-items:center;justify-content:center;transition:all 0.14s;cursor:pointer}
.lcheck.done{background:var(--green);border-color:var(--green)}
.ltitle{flex:1;font-size:13px}
.ltitle.done{text-decoration:line-through;color:var(--text3)}
.lcol{width:110px;flex-shrink:0;font-size:12px;color:var(--text2)}
.lcol.sm{width:80px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:100;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);animation:fi 0.15s ease}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:14px;width:540px;max-width:96vw;max-height:90vh;overflow-y:auto;box-shadow:0 28px 70px rgba(0,0,0,0.55);animation:mu 0.18s ease}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes mu{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.modal-hdr{padding:20px 20px 0;display:flex;align-items:flex-start;gap:12px}
.modal-title{flex:1;background:transparent;border:none;outline:none;font-size:18px;font-weight:600;color:var(--text);font-family:inherit;resize:none;line-height:1.3;padding:0}
.modal-title::placeholder{color:var(--text3)}
.mclose{width:28px;height:28px;border-radius:6px;background:var(--surface2);border:none;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all 0.12s}
.mclose:hover{background:var(--surface3);color:var(--text)}
.modal-body{padding:16px 20px 8px}
.mrow{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.mfield{display:flex;flex-direction:column;gap:4px;flex:1;min-width:110px}
.mlabel{font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--text3)}
.msel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 10px;color:var(--text);font-size:12.5px;font-family:inherit;outline:none;cursor:pointer;width:100%;transition:border-color 0.12s}
.msel:focus{border-color:var(--accent)}
.mdesc{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;color:var(--text);font-size:13px;font-family:inherit;outline:none;resize:vertical;min-height:78px;line-height:1.5;transition:border-color 0.12s}
.mdesc:focus{border-color:var(--accent)}
.mdesc::placeholder{color:var(--text3)}
.divider{height:1px;background:var(--border);margin:14px 0}
.st-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface2);border-radius:var(--radius-sm);font-size:12.5px;margin-bottom:4px}
.stcheck{width:14px;height:14px;border:1.5px solid var(--border2);border-radius:3px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.stcheck.done{background:var(--green);border-color:var(--green)}
.add-st{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--text3);cursor:pointer;padding:5px 10px;border-radius:var(--radius-sm);transition:all 0.12s}
.add-st:hover{color:var(--text2);background:var(--surface2)}
.cm-row{display:flex;gap:8px;margin-bottom:8px}
.cm-body{flex:1;background:var(--surface2);border-radius:var(--radius-sm);padding:9px 11px}
.cm-author{font-size:11px;font-weight:600;color:var(--accent2);margin-bottom:3px}
.cm-text{font-size:12.5px;color:var(--text2);line-height:1.4}
.cm-input-row{display:flex;gap:8px;align-items:center;margin-top:8px}
.cm-input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px 11px;color:var(--text);font-size:12.5px;font-family:inherit;outline:none;transition:border-color 0.12s}
.cm-input:focus{border-color:var(--accent)}
.cm-input::placeholder{color:var(--text3)}
.modal-foot{padding:12px 20px 20px;display:flex;justify-content:flex-end;gap:8px}
.att-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.att-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px;position:relative}
.att-name{font-size:11px;color:var(--text2);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.att-media{width:100%;height:88px;object-fit:cover;border-radius:6px;background:var(--surface3)}
.att-doc{height:88px;border-radius:6px;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--text2);text-align:center;padding:8px}
.att-del{position:absolute;top:6px;right:6px;width:20px;height:20px;border:none;background:rgba(0,0,0,0.55);color:#fff;border-radius:999px;cursor:pointer;font-size:11px}
.ai-box{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px}
.ai-out{white-space:pre-wrap;line-height:1.45;color:var(--text2);font-size:12.5px;max-height:220px;overflow:auto}
.studio-modal{width:760px}
.up-note{font-size:11px;color:var(--text3);margin-top:4px}
.role-pill{font-size:10px;padding:2px 7px;border-radius:999px;border:1px solid var(--border2);color:var(--text2);cursor:pointer}
.role-pill:hover{color:var(--text)}
.brief-wrap{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:10px}
.brief-feed{max-height:190px;overflow:auto;display:flex;flex-direction:column;gap:7px;margin-bottom:8px}
.brief-msg{padding:8px 10px;border-radius:8px;font-size:12.5px;line-height:1.4;white-space:pre-wrap}
.brief-msg.user{background:rgba(124,106,247,0.18);border:1px solid rgba(124,106,247,0.32)}
.brief-msg.bot{background:var(--surface3);border:1px solid var(--border2);color:var(--text2)}

/* TOAST */
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius);padding:11px 16px;font-size:13px;z-index:200;display:flex;align-items:center;gap:8px;animation:mu 0.18s ease;box-shadow:0 8px 24px rgba(0,0,0,0.4)}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* UTILS */
.flex{display:flex}.aic{align-items:center}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}
input[type=date].msel{color-scheme:dark}

/* AUTH */
.auth-wrap{height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:
radial-gradient(circle at 20% 0%,rgba(124,106,247,0.2),transparent 32%),
radial-gradient(circle at 80% 100%,rgba(52,211,153,0.16),transparent 36%),var(--bg)}
.auth-card{width:430px;max-width:95vw;background:var(--surface);border:1px solid var(--border2);border-radius:16px;padding:22px 22px 18px;box-shadow:0 28px 70px rgba(0,0,0,0.45)}
.auth-title{font-size:24px;font-weight:700;letter-spacing:-0.5px;margin-bottom:5px}
.auth-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
.auth-row{display:flex;gap:10px}
.auth-field{margin-bottom:11px}
.auth-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:6px}
.auth-inp{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 11px;color:var(--text);font-size:13px;font-family:inherit;outline:none}
.auth-inp:focus{border-color:var(--accent)}
.auth-note{font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;margin:10px 0 12px}
.auth-foot{display:flex;justify-content:space-between;gap:8px;margin-top:4px}
.auth-link{background:transparent;border:none;color:var(--accent2);font-size:12.5px;cursor:pointer;padding:3px 0}
.auth-link:hover{text-decoration:underline}
.chat-wrap{padding:18px;height:100%;display:flex;flex-direction:column;gap:10px}
.chat-feed{flex:1;overflow:auto;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px}
.chat-msg{max-width:78%;padding:8px 10px;border-radius:8px;font-size:12.5px;line-height:1.4}
.chat-msg.me{margin-left:auto;background:rgba(124,106,247,0.2);border:1px solid rgba(124,106,247,0.35)}
.chat-msg.ot{background:var(--surface2);border:1px solid var(--border2)}
.chat-meta{font-size:10px;color:var(--text3);margin-bottom:3px}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}
.cal-wd{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;padding:2px 6px}
.cal-cell{min-height:110px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:6px;display:flex;flex-direction:column;gap:5px}
.cal-cell.muted{opacity:.45}
.cal-day{font-size:11px;color:var(--text2);font-family:'DM Mono',monospace}
.cal-task{font-size:11px;line-height:1.3;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;cursor:pointer}
.cal-task:hover{background:var(--surface3)}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const COLORS=['#7c6af7','#34d399','#f472b6','#60a5fa','#fbbf24','#f87171','#a78bfa'];
const AVATARS={Alex:'#7c6af7',Sam:'#34d399',Jordan:'#f472b6',Casey:'#60a5fa',Morgan:'#fbbf24'};
const TASK_GROUPS=['CRM','PAID MEDIA','ORGANIC SOCIAL','DEVELOPERS'];
const DEFAULT_COMPANY='company-a';

const INIT={
  projects:[
    {id:'p1',name:'Website Redesign',color:'#7c6af7'},
    {id:'p2',name:'Mobile App',color:'#34d399'},
    {id:'p3',name:'Marketing Q2',color:'#fbbf24'},
  ],
  columns:[
    {id:'c1',name:'Backlog',color:'#5a5a72',pid:'p1'},

    {id:'c4',name:'Done',color:'#34d399',pid:'p1'},
    {id:'c5',name:'Backlog',color:'#5a5a72',pid:'p2'},
    {id:'c6',name:'In Progress',color:'#60a5fa',pid:'p2'},
    {id:'c7',name:'Done',color:'#34d399',pid:'p2'},
    {id:'c8',name:'Ideas',color:'#f472b6',pid:'p3'},
    {id:'c9',name:'In Progress',color:'#60a5fa',pid:'p3'},
    {id:'c10',name:'Done',color:'#34d399',pid:'p3'},
  ],
  tasks:[
    {id:'t1',title:'Define brand guidelines and color system',cid:'c1',pri:'high',who:'Alex',due:'2026-04-10',tags:['Design'],subs:[{id:'s1',text:'Color palette',done:true},{id:'s2',text:'Typography scale',done:false}],cms:[{who:'Sam',text:'Should we include dark mode variants?'}],desc:'Establish the core visual identity for the redesign project.'},
    {id:'t2',title:'Audit current site performance metrics',cid:'c1',pri:'medium',who:'Sam',due:'2026-04-08',tags:['Research'],subs:[],cms:[],desc:''},
    {id:'t3',title:'Design new homepage hero section',cid:'c2',pri:'high',who:'Jordan',due:'2026-04-05',tags:['Design','UI'],subs:[{id:'s3',text:'Desktop mockup',done:true},{id:'s4',text:'Mobile mockup',done:false},{id:'s5',text:'Animation spec',done:false}],cms:[{who:'Alex',text:'Love the direction! Can we try a darker background?'},{who:'Jordan',text:'Working on it now'}],desc:'Create a compelling hero section that drives conversions.'},
    {id:'t4',title:'Implement responsive navigation',cid:'c2',pri:'medium',who:'Casey',due:'2026-04-12',tags:['Dev'],subs:[{id:'s6',text:'Desktop nav',done:true},{id:'s7',text:'Mobile hamburger menu',done:false}],cms:[],desc:''},
    {id:'t5',title:'Write copy for About page',cid:'c3',pri:'low',who:'Morgan',due:'2026-03-28',tags:['Content'],subs:[],cms:[{who:'Casey',text:'Needs SEO review before approval'}],desc:''},
    {id:'t6',title:'Set up CI/CD pipeline',cid:'c3',pri:'high',who:'Casey',due:'2026-04-15',tags:['Dev'],subs:[{id:'s8',text:'GitHub Actions',done:true},{id:'s9',text:'Staging env',done:true},{id:'s10',text:'Production deploy',done:false}],cms:[],desc:''},
    {id:'t7',title:'Old homepage archived',cid:'c4',pri:'low',who:'Alex',due:'2026-03-20',tags:['Admin'],subs:[],cms:[],desc:''},
    {id:'t8',title:'Analytics integration',cid:'c4',pri:'medium',who:'Sam',due:'2026-03-22',tags:['Dev'],subs:[],cms:[],desc:''},

function fmtDue(d){

  const diff=Math.round((dt-now)/86400000);
  if(diff<0)return{t:Math.abs(diff)+'d ago',late:true};
  if(diff===0)return{t:'Today',late:false};
  if(diff===1)return{t:'Tomorrow',late:false};
  return{t:dt.toLocaleDateString('en-US',{month:'short',day:'numeric'}),late:false};
}

function aiSummarize(text,prompt=''){
  const body=(text||'').replace(/\s+/g,' ').trim();
  if(!body)return 'No document text provided.';
  const sents=body.split(/(?<=[.!?])\s+/).filter(Boolean).slice(0,120);
  const kws=cleanWords(prompt);
  const scored=sents.map((s,i)=>{
    const ws=cleanWords(s);
    const hit=kws.length?ws.filter(w=>kws.includes(w)).length:0;
    const lenBoost=Math.min(1.4,Math.max(0.5,s.length/120));
    const posBoost=1/(1+i*0.08);
    return {s,score:(1+hit*1.8)*lenBoost*posBoost};
  }).sort((a,b)=>b.score-a.score);
  const top=scored.slice(0,5).map(x=>x.s.trim());
  const actions=sents.filter(s=>/\b(should|must|need to|next|action|todo|deliver|review|fix|implement)\b/i.test(s)).slice(0,4);
  return `Summary:\n- ${top.join('\n- ')}\n\nAction Items:\n${actions.length?actions.map(a=>`- ${a.trim()}`).join('\n'):'- No explicit action items detected.'}`;
}

    if(text.includes(title))score+=100;
    const tw=title.split(/\W+/).filter(w=>w.length>2);
    tw.forEach(w=>{if(text.includes(w))score+=3;});
    if(score>bestScore){bestScore=score;best=t;}
  });
  return bestScore>=6?best:null;
}
function buildTaskBrief(t,userPrompt=''){
  const desc=(t.desc||'').trim()||'No description provided yet.';
  const due=t.due?fmtDue(t.due)?.t||t.due:'No due date set';
  const team=taskMembers(t).join(', ')||'Unassigned';
  return `Project Brief: ${t.title}
- Objective: Deliver ${t.title.toLowerCase()} with clear outcome and owner accountability.
- Context: ${desc}
- Team: ${team}
- Priority: ${(t.pri||'medium').toUpperCase()}
- Deadline: ${due}
- Success Criteria:
  - Task moved to Done with acceptance notes.
  - Stakeholders confirm output quality.
  - Dependencies and blockers tracked in comments.
- Execution Plan:
  - Define scope and required assets.
  - Build first draft and review internally.
  - Implement revisions and finalize.
${userPrompt?`- Extra instruction: ${userPrompt}`:''}`;
}
function aiStudioReply(question){
  const q=(question||'').trim();
  const lower=q.toLowerCase();
  const target=findTaskFromQuery(q);
  const isMarketing=/\b(campaign|ads?|paid media|funnel|ctr|cpa|roas|creative|targeting|landing page)\b/.test(lower);
  const isProduct=/\b(feature|dev|developer|build|qa|deploy|release|bug|onboarding|product)\b/.test(lower);
  const execPlan=(goal)=>{
    const team=target?taskMembers(target).join(', '):'Owner, Developer, Marketer, Designer';
    const status=target?(colById(target.cid)?.name||'Unknown'):'Not started';
    const due=target?(fmtDue(target.due||'')?.t||target.due||'TBD'):'TBD';
    const group=target?normalizeGroup(target.group):'CRM';
    const mkExtra=isMarketing?`\n- Funnel: Awareness -> Consideration -> Conversion\n- Creative: 3 variants per audience\n- Tracking: UTM + pixel + conversion API\n- Core metrics: CTR, CPC, CPA, ROAS`:'';
    const devExtra=isProduct?`\n- Build phases: discovery -> implementation -> QA -> deploy\n- Quality gates: staging QA + rollback plan`:'';
    return `1. OBJECTIVE\n- ${goal}\n\n2. BREAKDOWN (TASK TREE)\n- Discovery and requirements\n- Build assets/work items\n- Review and QA\n- Launch and measurement\n\n3. PRIORITIZATION\n- Start with blockers and highest-impact deliverables first.\n\n4. DEPENDENCIES\n- Scope approval -> asset creation -> implementation -> QA -> launch\n\n5. ASSIGNMENTS\n- Suggested owners: ${team}\n\n6. TIMELINE\n- Current status: ${status}\n- Suggested due target: ${due}\n\n7. RISKS & BOTTLENECKS\n- Scope creep, unclear ownership, missing QA checkpoints.\n\n8. OPTIMIZATION IDEAS\n- Batch approvals, parallelize independent tasks, use templates.${mkExtra}${devExtra}\n\nContext task group: ${group}`;
  };
  if(/\b(write|create|draft|build)\b.*\bbrief\b/.test(lower)){
    if(target)return buildTaskBrief(target,q);
    if(openTid){
      const t=S.tasks.find(x=>x.id===openTid);
      if(t)return buildTaskBrief(t,q);
    }
    return 'I can write a brief. Mention a task name, e.g. "write a brief for design onboarding flow screens".';
  }
  if(/\b(task|status|progress|who|owner|working on|assignee|due)\b/.test(lower)){
    if(target)return taskStatusLine(target);
    return 'Tell me a task name and I will report owner, collaborators, status, due date, and progress.';
  }
  if(/\b(plan|launch|fix|improve|build|strategy|roadmap|project)\b/.test(lower)){
    return execPlan(q);
  }
  if(/\b(list|show)\b.*\b(tasks|deadlines|due)\b/.test(lower)){
    const tasks=S.tasks.filter(t=>t.company===currentCompany()).filter(t=>t.due).sort((a,b)=>new Date(a.due)-new Date(b.due)).slice(0,6);
    if(!tasks.length)return 'No due-dated tasks found in this company yet.';
    return `Upcoming Tasks\n${tasks.map(t=>`- ${t.title} (${fmtDue(t.due)?.t||t.due}) • ${taskMembers(t).join(', ')}`).join('\n')}`;
  }
  if(studioDoc.trim())return aiSummarize(studioDoc,q);
  return 'Ask me things like: "write a brief for [task name]" or "tell me about task [task name]".';
}
function briefChatReply(task,question){
  const q=(question||'').toLowerCase();
  const brief=(task.desc||task.ai?.doc||'').trim();
  if(!brief)return 'Add a short brief in Description first, then I can expand it and generate insights.';
  const sum=aiSummarize(brief,question);
  const due=task.due?fmtDue(task.due):null;
  if(/\b(expand|elaborate|detail|flesh out|scope)\b/.test(q)){
    return `Expanded Brief\n- Objective: ${task.title}\n- Success criteria: measurable improvement in delivery quality and completion.\n- Scope: ${brief.slice(0,220)}${brief.length>220?'...':''}\n- Risks: unclear requirements, timeline slips, review delays.\n- Suggested plan: discovery, draft, review, finalize.\n- Owner: ${task.who}${due?`\n- Timeline: target ${due.t}`:''}`;
  }
  if(/\b(insight|insights|risk|improve|recommend|advice)\b/.test(q)){
    return `Insights\n- Prioritize one clear outcome and define “done” in the brief.\n- Split work into milestones with owners and deadlines.\n- Add review checkpoints early to reduce rework.${due&&due.late?'\n- Timeline alert: this item is overdue, so re-baseline dates immediately.':''}\n\n${sum}`;
  }
  return `Brief Assistant\n${sum}\n\nSuggestion: ask “expand this brief” or “give me insights and risks” for deeper output.`;
}
async function readFilesAsText(files){
  const out=[];
  for(const f of [...files]){
    const name=(f.name||'').toLowerCase();
    const ok=f.type.startsWith('text/')||/\.(txt|md|csv|json|html|js|ts|jsx|tsx|py|java|css|xml|yml|yaml)$/i.test(name);
    if(!ok)continue;
    out.push(await f.text());
  }
  return out.join('\n\n');
}
function fileToDataUrl(file){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>resolve(fr.result);
    fr.onerror=reject;
    fr.readAsDataURL(file);
  });
}
function makeInvite(email,role='member',company=currentCompany()){
  const code='inv_'+Date.now().toString(36)+Math.random().toString(36).slice(2,8);
  const cleanEmail=(email||'').toLowerCase().trim();
  const invite={email:cleanEmail,role,company,code,createdAt:Date.now(),createdBy:me()};
  let users=[...auth.users];
  if(cleanEmail){
    const existing=users.find(u=>u.email===cleanEmail);
    if(existing){
      existing.role=role==='admin'?'admin':'member';
      existing.company=company;
      existing.title=existing.role==='admin'?'Team Admin':'Team Member';
    }else{
      const base=cleanEmail.split('@')[0]||'member';
      const name=base.replace(/[._-]+/g,' ').replace(/\b\w/g,m=>m.toUpperCase());
      users.push({
        email:cleanEmail,
        password:null,
        name:name||'Invited Member',
        verified:false,
        otpRequired:false,
        code:'',
        role:role==='admin'?'admin':'member',
        title:role==='admin'?'Team Admin':'Team Member',
        color:COLORS[users.length%COLORS.length],
        company,
        invited:true
      });
    }
  }
  if(sb){
    sbEnsureCompany(company,companyName(company),auth.session?.email||'').catch(()=>{});
    if(cleanEmail){
      const existingUser=users.find(u=>u.email===cleanEmail);
      sbUpsertMember({
        email:cleanEmail,
        name:existingUser?.name||cleanEmail.split('@')[0],
        role,
        title:role==='admin'?'Team Admin':'Team Member',
        color:existingUser?.color||COLORS[0],
        company,
        invited:true
      }).catch(()=>{});
    }
  }
  setAuth({...auth,users,invites:[...(auth.invites||[]),invite]});
  logAudit('Invite created',`${cleanEmail||'open link'} (${role})`);
  return `${location.origin}${location.pathname}?mode=signup&invite=${code}${cleanEmail?`&email=${encodeURIComponent(cleanEmail)}`:''}`;
}
function toSlug(v){
  return (v||'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'').slice(0,24)||'workspace';

function uniqueCompanyId(name){

  if(!auth.companies.some(c=>c.id===id))return id;
  return `${id}-${Date.now().toString(36).slice(-4)}`;

function calendarView(){
  const now=new Date();
  const y=now.getFullYear(),m=now.getMonth();
  const start=new Date(y,m,1), end=new Date(y,m+1,0), prevEnd=new Date(y,m,0);
  const days=end.getDate(), firstDow=start.getDay(), prevDays=prevEnd.getDate();
  const monthTasks=S.tasks.filter(t=>{
    if(t.company!==currentCompany())return false;
    if(!t.due)return false;
    const d=new Date(t.due);
    return d.getFullYear()===y&&d.getMonth()===m&&(activeMember?taskMembers(t).includes(activeMember):true);
  }).sort((a,b)=>new Date(a.due)-new Date(b.due));
  const byDay={};monthTasks.forEach(t=>{const d=new Date(t.due).getDate();(byDay[d]||(byDay[d]=[])).push(t);});
  const cells=[];
  for(let i=0;i<firstDow;i++)cells.push({day:prevDays-firstDow+1+i,muted:true,tasks:[]});
  for(let d=1;d<=days;d++)cells.push({day:d,muted:false,tasks:byDay[d]||[]});
  while(cells.length%7!==0)cells.push({day:cells.length%7+1,muted:true,tasks:[]});
  const wds=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let h=`<div class="list-view"><div class="lg"><div class="lg-hdr"><span class="lg-hdr-title">${start.toLocaleDateString('en-US',{month:'long',year:'numeric'})}</span><span style="font-size:11px;color:var(--text3);font-family:'DM Mono',monospace">${monthTasks.length} due</span></div><div class="cal-grid">${wds.map(w=>`<div class="cal-wd">${w}</div>`).join('')}${cells.map(c=>`<div class="cal-cell${c.muted?' muted':''}"><div class="cal-day">${c.day}</div>${c.tasks.slice(0,3).map(t=>`<div class="cal-task" data-tid="${t.id}">${t.title}</div>`).join('')}${c.tasks.length>3?`<div class="up-note">+${c.tasks.length-3} more</div>`:''}</div>`).join('')}</div></div></div>`;
  return h;
}

<div class="mfield" style="margin-bottom:10px"><div class="mlabel">Collaborators (multi-select)</div><div style="display:flex;gap:6px;flex-wrap:wrap">${memberList().map(m=>`<label class="tag" style="background:var(--surface2);color:var(--text2);cursor:pointer"><input type="checkbox" data-n-collab="${m}" style="margin-right:5px">${m}</label>`).join('')}</div></div>
<div class="mfield"><div class="mlabel" style="display:flex;justify-content:space-between;align-items:center">Description <button class="btn btn-ghost" id="n-template" style="padding:3px 8px;font-size:11px">Insert Template</button></div><textarea class="mdesc" id="n-desc" placeholder="What needs to be done?">${newTask.desc}</textarea></div>
</div>
<div class="modal-foot"><button class="btn btn-ghost" id="n-cancel">Cancel</button><button class="btn btn-primary" id="n-create">Create task</button></div>
</div></div>`;
}

function wire(){
  if(!auth.session){
    const setMode=(mode,note='')=>setAuth({...auth,mode,note});
    const ensureSupabaseFromInputs=()=>{
      if(hasSupabaseConfig())return true;
      const url=$('sb-url')?.value.trim()||'';
      const anon=$('sb-anon')?.value.trim()||'';
      if(url&&anon)setSupabaseCfg(url,anon);
      return hasSupabaseConfig();
    };
    const sbSave=$('sb-save');
    if(sbSave)sbSave.addEventListener('click',()=>{
      const url=$('sb-url')?.value.trim()||'';
      const anon=$('sb-anon')?.value.trim()||'';
      setSupabaseCfg(url,anon);
      setMode(auth.mode,hasSupabaseConfig()?'Connection saved. You can now sign up/log in.':'Please enter a real Supabase URL and anon key.');
      render();
    });
    const gl=$('goto-login');if(gl)gl.addEventListener('click',()=>{setMode('login');render()});
    const gs=$('goto-signup');if(gs)gs.addEventListener('click',()=>{setMode('signup');render()});
    const resendConfirm=$('resend-confirm');
    if(resendConfirm)resendConfirm.addEventListener('click',async()=>{
      if(!ensureSupabaseFromInputs()){setMode('login','Enter your Supabase URL and anon key, then click Save Supabase settings.');return render();}
      const email=$('li-email')?.value.trim().toLowerCase();
      if(!email){setMode('login','Enter your email first.');return render();}
      const r=await sbResendSignup(email);
      if(r.error){setMode('login',mapAuthError(r.error.message));return render();}
      setMode('login','Confirmation email resent. Check inbox/spam.');
      render();
    });
    const forgotPass=$('forgot-pass');
    if(forgotPass)forgotPass.addEventListener('click',async()=>{
      if(!ensureSupabaseFromInputs()){setMode('login','Enter your Supabase URL and anon key, then click Save Supabase settings.');return render();}
      const email=$('li-email')?.value.trim().toLowerCase();
      if(!email){setMode('login','Enter your email first.');return render();}
      const r=await sbResetPassword(email);
      if(r.error){setMode('login',mapAuthError(r.error.message));return render();}
      setMode('login','Password reset email sent.');
      render();
    });
    const su=$('su-btn');
    if(su)su.addEventListener('click',async()=>{
      const name=$('su-name').value.trim();
      const email=$('su-email').value.trim().toLowerCase();
      const pass=$('su-pass').value;
      const inputCompany=$('su-company')?.value.trim()||'';
      const inviteCode=$('su-invite')?.value.trim()||'';
      if(!name||!email||pass.length<6){setMode('signup','Please enter valid details (password minimum 6 chars).');return render();}
      if(!ensureSupabaseFromInputs()){setMode('signup','Supabase connection required. Enter URL + anon key and click Save Supabase settings.');return render();}
      const existing=auth.users.find(u=>u.email===email);
      let role='member';
      let company=DEFAULT_COMPANY;
      let companies=[...auth.companies];
      let invites=[...(auth.invites||[])];
      if(inviteCode){
        const idx=invites.findIndex(i=>i.code===inviteCode&&(i.email===email||!i.email));
        if(idx===-1){setMode('signup','Invalid invite code.');return render();}
        role=invites[idx].role||'member';
        company=invites[idx].company||DEFAULT_COMPANY;
        invites.splice(idx,1);
      }else{
        const label=inputCompany||`${name}'s Team`;
        company=uniqueCompanyId(label);
        role='admin';
        companies=[...companies,{id:company,name:label}];
        const projId=createCompanyWorkspace(company,label);
        activePid=projId;
      }
      const sign=await sbSignUp(email,pass,{name,role,company,companyName:companyName(company)});
      if(sign.error){
        const mapped=mapAuthError(sign.error.message||'Signup failed');
        if((sign.error.message||'').toLowerCase().includes('already'))setMode('login','Account already exists. Please log in.');
        else setMode('signup',mapped);
        return render();
      }
      let users=[...auth.users];
      if(existing){
        users=users.map(u=>u.email===email?{
          ...u,
          password:null,
          name,
          verified:true,
          otpRequired:false,
          code:'',
          role,
          title:role==='admin'?'Team Admin':'Team Member',
          company,
          invited:false
        }:u);
      }else{
        users=[...users,{email,password:null,name,verified:true,otpRequired:false,code:'',role,title:role==='admin'?'Team Admin':'Team Member',color:COLORS[auth.users.length%COLORS.length],company,invited:false}];
      }
      const sessionUser=sign.data?.user||null;
      await sbEnsureCompany(company,companyName(company),email).catch(()=>{});
      await sbUpsertMember({
        email,name,role,company,
        title:role==='admin'?'Team Admin':'Team Member',
        color:COLORS[users.length%COLORS.length],
        invited:false
      }).catch(()=>{});
      await sbSignOut();
      setAuth({...auth,companies,users,invites,session:null,mode:'login',note:'Account created. Please log in with your new password.'});
      toast('Account created');
      render();
    });
    const li=$('li-btn');
    if(li)li.addEventListener('click',async()=>{
      const email=$('li-email').value.trim().toLowerCase();
      const pass=$('li-pass').value;
      if(!ensureSupabaseFromInputs()){setMode('login','Supabase connection required. Enter URL + anon key and click Save Supabase settings.');return render();}
      const sign=await sbSignIn(email,pass);
      if(sign.error){
        const invited=auth.users.find(u=>u.email===email&&u.invited);
        if(invited)setMode('signup','Finish account setup from your invite link first.');
        else setMode('login',mapAuthError(sign.error.message||'Invalid email or password.'));
        return render();
      }
      const u=sign.data?.user;
      const meta=u?.user_metadata||{};
      const local=ensureLocalAccount(email,{name:meta.name||email.split('@')[0],role:meta.role||'member',company:meta.company||auth.users.find(x=>x.email===email)?.company||DEFAULT_COMPANY,companyName:meta.companyName||''});
      setAuth({...auth,session:{email,name:local?.name||meta.name||email.split('@')[0],company:local?.company||meta.company||DEFAULT_COMPANY},note:''});
      render();
    });
    return;
  }

  // Sidebar nav
  qq('[data-sec]').forEach(el=>el.addEventListener('click',()=>{
    activeSection=el.dataset.sec;
    activeMember='';
    if(activeSection==='dash')activeView='list';
    render();
  }));
  qq('[data-pid]').forEach(el=>el.addEventListener('click',()=>{
    activePid=el.dataset.pid;
    activeSection='project';
    activeMember='';
    render();
  }));
  qq('[data-member]').forEach(el=>el.addEventListener('click',()=>{
    activeMember=el.dataset.member||'';
    activeSection='all';
    activeView='list';
    render();
  }));
  qq('[data-open-profile]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    if(!isAdmin())return;
    profileEmail=el.dataset.openProfile;
    showUserModal=true;
    render();
  }));
  // View toggle
  qq('[data-view]').forEach(el=>el.addEventListener('click',()=>{activeView=el.dataset.view;render()}));
  const csw=$('company-switch');
  if(csw)csw.addEventListener('change',async()=>{
    if(!auth.session)return;
    const company=csw.value;
    await sbLoadCompanyState(company).catch(()=>{});
    const firstProj=S.projects.find(p=>p.company===company)?.id||'';
    activePid=firstProj||activePid;
    setAuth({...auth,session:{...auth.session,company}});
    render();
  });
  // User management
  const usersBtn=$('users-btn');
  if(usersBtn)usersBtn.addEventListener('click',()=>{
    profileEmail=currentUser()?.email||'';
    showUserModal=true;
    render();
  });
  const usrClose=$('usr-close');if(usrClose)usrClose.addEventListener('click',()=>{showUserModal=false;render()});
  const usrCancel=$('usr-cancel');if(usrCancel)usrCancel.addEventListener('click',()=>{showUserModal=false;render()});
  const usrOv=$('usr-ov');if(usrOv)usrOv.addEventListener('click',e=>{if(e.target===usrOv){showUserModal=false;render()}});
  const usrSave=$('usr-save');
  if(usrSave)usrSave.addEventListener('click',()=>{
    const target=auth.users.find(u=>u.email===profileEmail);if(!target)return;
    const canEdit=isAdmin()||target.email===currentUser()?.email;
    if(!canEdit)return;
    const previousRole=target.role;
    target.name=$('usr-name').value.trim()||target.name;
    target.title=$('usr-title').value.trim()||target.title;
    target.color=$('usr-color').value.trim()||target.color;
    if(isAdmin()){
      const requestedRole=$('usr-role').value==='admin'?'admin':'member';
      target.role=requestedRole;
      if(previousRole!==target.role){
        logAudit('User role changed',`${target.email}: ${previousRole} -> ${target.role}`);
      }
    }
    if(auth.session?.email===target.email)auth.session.name=target.name;
    setAuth({...auth,users:[...auth.users]});
    toast('Profile updated');
    showUserModal=false;
    render();
  });
  qq('[data-prof-open]').forEach(el=>el.addEventListener('click',()=>{
    profileEmail=el.dataset.profOpen;
    showUserModal=true;
    render();
  }));
  qq('[data-user-remove]').forEach(el=>el.addEventListener('click',()=>{
    if(!isAdmin())return;
    const email=(el.dataset.userRemove||'').toLowerCase();
    if(!email||email===currentUser()?.email){toast('You cannot remove your own active account');return;}
    const target=auth.users.find(u=>u.email===email);
    if(!target||target.company!==currentCompany())return;
    const adminCount=auth.users.filter(u=>u.company===target.company&&u.role==='admin').length;
    if(target.role==='admin'&&adminCount<=1){toast('Add another admin before removing this admin');return;}
    if(!confirm(`Remove ${target.name} from ${companyName(target.company)}?`))return;
    S.tasks.forEach(t=>{
      if(t.company!==target.company)return;
      if(t.who===target.name)t.who=me();
      if(Array.isArray(t.collabs))t.collabs=t.collabs.filter(n=>n!==target.name);
    });
    logAudit('User removed',target.email);
    sbDeleteMember(target.company,target.email).catch(()=>{});
    profileEmail=currentUser()?.email||'';
    setAuth({...auth,users:auth.users.filter(u=>u.email!==email)});
    toast('User removed');
    render();
  }));
  const addUserBtn=$('add-user-btn');
  if(addUserBtn)addUserBtn.addEventListener('click',async()=>{
    if(!isAdmin())return;
    const name=$('add-name').value.trim();
    const email=$('add-email').value.trim().toLowerCase();
    const role=$('add-role').value==='admin'?'admin':'member';
    const company=$('add-company')?.value||currentCompany();
    if(!name||!email){toast('Name and email are required');return;}
    if(auth.users.some(u=>u.email===email)){toast('Email already exists');return;}
    const users=[...auth.users,{email,password:null,name,verified:false,otpRequired:false,code:'',role,title:role==='admin'?'Team Admin':'Team Member',color:COLORS[auth.users.length%COLORS.length],company,invited:true}];
    setAuth({...auth,users});
    const link=makeInvite(email,role,company);
    logAudit('User created',`${email} (${role})`);
    try{await navigator.clipboard.writeText(link);toast(`${name} added as ${role}. Invite link copied.`);}
    catch(_){toast(`${name} added as ${role}. Send invite link next.`);}
    render();
  });
  const invCopy=$('inv-copy');
  if(invCopy)invCopy.addEventListener('click',async()=>{
    const email=$('inv-email').value.trim().toLowerCase();
    const role=$('inv-role').value==='admin'?'admin':'member';
    const company=$('inv-company')?.value||currentCompany();
    const link=makeInvite(email,role,company);
    logAudit('Invite link generated',`${role} ${email||'(open link)'}`);
    try{await navigator.clipboard.writeText(link);toast(email?'Invite link copied':'Open invite link copied');}
    catch(_){toast(link);}
    render();
  });
  const invOpenCopy=$('inv-open-copy');
  if(invOpenCopy)invOpenCopy.addEventListener('click',async()=>{
    const role=$('inv-role').value==='admin'?'admin':'member';
    const company=$('inv-company')?.value||currentCompany();
    const link=makeInvite('',role,company);
    logAudit('Open invite generated',role);
    try{await navigator.clipboard.writeText(link);toast('Open invite link copied');}
    catch(_){toast(link);}
    render();
  });
  const invEmailBtn=$('inv-email-btn');
  if(invEmailBtn)invEmailBtn.addEventListener('click',async()=>{
    const email=$('inv-email').value.trim().toLowerCase();
    const role=$('inv-role').value==='admin'?'admin':'member';
    const company=$('inv-company')?.value||currentCompany();
    if(!email){toast('Enter an email first');return;}
    const link=makeInvite(email,role,company);
    const subject=encodeURIComponent('You are invited to WorkFlow');
    const body=encodeURIComponent(`You are invited to join ${companyName(company)} in WorkFlow.\n\n1) Open this invite link:\n${link}\n2) Create your account with your own password.\n3) Sign in and start collaborating.\n\nRole: ${role}`);
    location.href=`mailto:${email}?subject=${subject}&body=${body}`;
    logAudit('Invite email launched',`${email} (${role})`);
    toast('Opened email app with invite');
    render();
  });
  // AI Studio
  const aiBtn=$('ai-btn');if(aiBtn)aiBtn.addEventListener('click',()=>{showAiStudio=true;render()});
  const aiClose=$('ai-close');if(aiClose)aiClose.addEventListener('click',()=>{showAiStudio=false;render()});
  const aiOv=$('ai-ov');if(aiOv)aiOv.addEventListener('click',e=>{if(e.target===aiOv){showAiStudio=false;render()}});
  const aiBuild=$('ai-build');
  if(aiBuild)aiBuild.addEventListener('click',()=>{
    const p=aiBuildPrompt($('ai-goal').value.trim(),$('ai-style').value.trim(),$('ai-format').value.trim(),$('ai-notes').value.trim());
    studioPrompt=p;studioOut=p;$('ai-out').textContent=studioOut;
  });
  const aiDocImport=$('ai-doc-import');
  if(aiDocImport)aiDocImport.addEventListener('click',async()=>{
    const fi=$('ai-doc-files');if(!fi?.files?.length)return;
    const txt=await readFilesAsText(fi.files);
    if(!txt){toast('No supported text files selected');return;}
    $('ai-doc').value=($('ai-doc').value?$('ai-doc').value+'\n\n':'')+txt;
    toast('Document text imported');
  });
  const aiSumm=$('ai-summarize');
  if(aiSumm)aiSumm.addEventListener('click',()=>{
    studioDoc=$('ai-doc').value;
    const prompt=studioPrompt||aiBuildPrompt($('ai-goal').value.trim(),$('ai-style').value.trim(),$('ai-format').value.trim(),$('ai-notes').value.trim());
    studioOut=aiSummarize(studioDoc,prompt);
    studioChat.push({role:'user',text:'Summarize the current document'});
    studioChat.push({role:'bot',text:studioOut});
    $('ai-out').textContent=studioOut;
  });
  const aiChatSend=$('ai-chat-send');
  if(aiChatSend)aiChatSend.addEventListener('click',()=>{
    const q=$('ai-chat-inp')?.value.trim();
    if(!q)return;
    studioDoc=$('ai-doc')?.value||studioDoc;
    const a=aiStudioReply(q);
    studioChat.push({role:'user',text:q});
    studioChat.push({role:'bot',text:a});
    studioOut=a;
    render();
  });
  const aiChatInp=$('ai-chat-inp');
  if(aiChatInp)aiChatInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('ai-chat-send')?.click()}});
  const aiClear=$('ai-clear');
  if(aiClear)aiClear.addEventListener('click',()=>{
    studioPrompt='';studioDoc='';studioOut='';studioChat=[];
    render();
  });
  const aiUse=$('ai-use-prompt');
  if(aiUse)aiUse.addEventListener('click',()=>{
    if(!openTid){toast('Open a task to use this prompt there');return;}
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    const lastBot=[...studioChat].reverse().find(m=>m.role==='bot')?.text||'';
    t.ai.prompt=studioPrompt||lastBot||$('ai-out').textContent||'';
    toast('Prompt copied to task AI panel');
  });
  // Search
  const si=$('s-inp');
  if(si)si.addEventListener('input',e=>{
    const next=e.target.value;
    clearTimeout(searchTimer);
    searchTimer=setTimeout(()=>{search=next;render();},130);
  });
  const chatSend=$('chat-send');
  if(chatSend)chatSend.addEventListener('click',()=>{
    const v=$('chat-inp')?.value.trim();
    if(!v)return;
    S.chats.push({id:'m'+Date.now(),company:currentCompany(),who:me(),text:v,ts:Date.now()});
    persistSoon();
    render();
  });
  const chatInp=$('chat-inp');
  if(chatInp)chatInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('chat-send')?.click()}});
  const out=$('logout-row');
  if(out)out.addEventListener('click',async()=>{
    await sbSignOut();
    setAuth({...auth,session:null,mode:'login',note:''});
    openTid=null;showNewModal=false;showAiStudio=false;showUserModal=false;
    render();
  });
  // New task
  const nb=$('new-btn');if(nb)nb.addEventListener('click',()=>{
    const pid=activeSection==='project'?activePid:S.projects[0]?.id;
    const group='CRM';
    newTask={title:'',cid:projCols(pid)[0]?.id||'',pri:'medium',group,who:me(),due:'',desc:taskDescriptionTemplate(group,'')};
    showNewModal=true;render();
  });
  // Add column
  const ac=$('add-col-btn');
  if(ac)ac.addEventListener('click',()=>{
    const name=prompt('Column name:');if(!name)return;
    S.columns.push({id:'c'+Date.now(),name,color:COLORS[S.columns.length%COLORS.length],pid:activePid,company:currentCompany()});
    toast('Column "'+name+'" added');render();
  });
  // Open task cards
  qq('[data-tid]').forEach(el=>el.addEventListener('click',e=>{
    if(e.target.closest('[data-lcheck]')||e.target.closest('[data-stid]'))return;
    openTid=el.dataset.tid;
    const t=S.tasks.find(x=>x.id===openTid);if(t)ensureTaskShape(t);
    stInputOpen=false;render();
  }));
  // Add task from column
  qq('[data-addcol]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const group='CRM';
    newTask={title:'',cid:el.dataset.addcol,pri:'medium',group,who:me(),due:'',desc:taskDescriptionTemplate(group,'')};
    showNewModal=true;render();
  }));
  // List check
  qq('[data-lcheck]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const t=S.tasks.find(x=>x.id===el.dataset.lcheck);if(!t)return;
    const pid=taskPid(t);
    const doneCols=S.columns.filter(c=>c.pid===pid&&c.name==='Done');
    const backlog=S.columns.find(c=>c.pid===pid&&c.name==='Backlog');
    if(doneCols.length&&t.cid!==doneCols[0].id){t.cid=doneCols[0].id;toast('Marked as done');}
    else if(backlog){t.cid=backlog.id;toast('Moved to Backlog');}
    render();
  }));
  // Task modal
  const mc=$('m-close');if(mc)mc.addEventListener('click',()=>{openTid=null;render()});
  const mcanc=$('m-cancel');if(mcanc)mcanc.addEventListener('click',()=>{openTid=null;render()});
  const ov=$('ov');if(ov)ov.addEventListener('click',e=>{if(e.target===ov){openTid=null;render()}});
  const ms=$('m-save');
  if(ms)ms.addEventListener('click',()=>{
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    ensureTaskShape(t);
    t.title=$('m-title').value||t.title;
    t.cid=$('m-col').value;t.pri=$('m-pri').value;
    t.group=normalizeGroup($('m-group').value);
    t.who=$('m-who').value;t.due=$('m-due').value;
    t.collabs=[...qq('[data-m-collab]:checked')].map(x=>x.dataset.mCollab).filter(n=>n&&n!==t.who);
    t.desc=$('m-desc').value;
    t.ai.prompt=$('m-ai-prompt')?.value||'';
    t.ai.doc=$('m-ai-doc')?.value||'';
    t.ai.out=$('m-ai-out')?.textContent||'';
    toast('Changes saved');openTid=null;render();
  });
  const del=$('del-btn');
  if(del)del.addEventListener('click',()=>{
    if(!confirm('Delete this task?'))return;
    S.tasks=S.tasks.filter(x=>x.id!==openTid);
    toast('Task deleted');openTid=null;render();
  });
  // Subtasks
  qq('[data-stid]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    const s=t.subs.find(x=>x.id===el.dataset.stid);if(s){s.done=!s.done;render();}
  }));
  const addSt=$('add-st-btn');
  if(addSt)addSt.addEventListener('click',()=>{stInputOpen=!stInputOpen;render()});
  const saveSt=$('save-st-btn');
  if(saveSt)saveSt.addEventListener('click',()=>{
    const val=$('st-inp').value.trim();if(!val)return;
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    t.subs.push({id:'s'+Date.now(),text:val,done:false});
    stInputOpen=false;toast('Subtask added');render();
  });
  const stInp=$('st-inp');
  if(stInp)stInp.addEventListener('keydown',e=>{if(e.key==='Enter'){$('save-st-btn')?.click()}});
  // Brief chatbot
  const briefSend=$('brief-send');
  if(briefSend)briefSend.addEventListener('click',()=>{
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    ensureTaskShape(t);
    t.desc=$('m-desc')?.value||t.desc;
    const q=$('brief-inp')?.value.trim();
    if(!q)return;
    t.briefChat.push({role:'user',text:q,ts:Date.now()});
    const a=briefChatReply(t,q);
    t.briefChat.push({role:'bot',text:a,ts:Date.now()});
    render();
  });
  const briefInp=$('brief-inp');
  if(briefInp)briefInp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();$('brief-send')?.click()}});
  // Attachments
  const addAtt=$('m-att-add');
  if(addAtt)addAtt.addEventListener('click',async()=>{
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    ensureTaskShape(t);
    const fi=$('m-att-files');if(!fi?.files?.length)return;
    for(const f of [...fi.files]){
      let kind='doc';
      if(f.type.startsWith('image/'))kind='image';
      else if(f.type.startsWith('video/'))kind='video';
      const url=await fileToDataUrl(f);
      t.atts.push({id:'a'+Date.now()+Math.random().toString(36).slice(2,6),name:f.name,kind,url,size:f.size});
    }
    toast('Files attached');
    render();
  });
  qq('[data-att-del]').forEach(el=>el.addEventListener('click',e=>{
    e.stopPropagation();
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    t.atts=(t.atts||[]).filter(a=>a.id!==el.dataset.attDel);
    render();
  }));
  // Task AI
  const maiImp=$('m-ai-import');
  if(maiImp)maiImp.addEventListener('click',async()=>{
    const fi=$('m-ai-files');if(!fi?.files?.length)return;
    const txt=await readFilesAsText(fi.files);
    if(!txt){toast('No supported text files selected');return;}
    const md=$('m-ai-doc');
    md.value=(md.value?md.value+'\n\n':'')+txt;
    toast('Task doc imported');
  });
  const maiRun=$('m-ai-run');
  if(maiRun)maiRun.addEventListener('click',()=>{
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    ensureTaskShape(t);
    const p=$('m-ai-prompt').value.trim();
    const doc=$('m-ai-doc').value.trim()||$('m-desc').value.trim();
    const out=aiSummarize(doc,p);
    t.ai.prompt=p;t.ai.doc=doc;t.ai.out=out;
    $('m-ai-out').textContent=out;
    toast('AI review complete');
  });
  // Comments
  const postCm=$('post-cm-btn');
  if(postCm)postCm.addEventListener('click',()=>{
    const val=$('cm-inp').value.trim();if(!val)return;
    const t=S.tasks.find(x=>x.id===openTid);if(!t)return;
    t.cms.push({who:me(),text:val});
    toast('Comment posted');render();
  });
  const cmInp=$('cm-inp');
  if(cmInp)cmInp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();$('post-cm-btn')?.click()}});
  // New task modal
  const nc=$('n-close');if(nc)nc.addEventListener('click',()=>{showNewModal=false;render()});
  const ncanc=$('n-cancel');if(ncanc)ncanc.addEventListener('click',()=>{showNewModal=false;render()});
  const nv=$('nv');if(nv)nv.addEventListener('click',e=>{if(e.target===nv){showNewModal=false;render()}});
  const ncr=$('n-create');
  if(ncr)ncr.addEventListener('click',()=>{
    const title=$('n-title').value.trim();
    if(!title){$('n-title').style.borderBottom='2px solid var(--red)';$('n-title').focus();return;}
    const owner=$('n-who').value;
    const collabs=[...qq('[data-n-collab]:checked')].map(x=>x.dataset.nCollab).filter(n=>n&&n!==owner);
    const group=normalizeGroup($('n-group').value);
    const rawDesc=$('n-desc').value.trim();
    const desc=rawDesc||taskDescriptionTemplate(group,title);
    S.tasks.push({id:'t'+Date.now(),title,cid:$('n-col').value,pri:$('n-pri').value,group,who:owner,collabs,due:$('n-due').value,tags:[],subs:[],cms:[],desc,atts:[],ai:{prompt:'',doc:'',out:''},briefChat:[],company:currentCompany()});
    showNewModal=false;newTask={title:'',cid:'',pri:'medium',group:'CRM',who:me(),due:'',desc:''};
    toast('"'+title+'" created');render();
  });
  const nTemplate=$('n-template');
  if(nTemplate)nTemplate.addEventListener('click',()=>{
    const g=normalizeGroup($('n-group')?.value||'CRM');
    $('n-desc').value=taskDescriptionTemplate(g,$('n-title')?.value||'');
  });
  const nGroup=$('n-group');
  if(nGroup)nGroup.addEventListener('change',()=>{
    const descEl=$('n-desc');if(!descEl)return;
    if(descEl.value.trim())return;
    descEl.value=taskDescriptionTemplate(normalizeGroup(nGroup.value||'CRM'),$('n-title')?.value||'');
  });
  const ntInp=$('n-title');
  if(ntInp)ntInp.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.metaKey){$('n-create')?.click()}});
}

async function initApp(){
  if(sb){
    try{
      if(urlInviteCode||urlMode==='signup'){
        await sb.auth.signOut();
      }
      const {data,error}=await sb.auth.getSession();
      if(!error&&data?.session?.user){
        const su=data.session.user;
        const email=(su.email||'').toLowerCase();
        const hydrated=await sbHydrateForEmail(email);
        if(hydrated){
          auth=normalizeAuth({
            ...auth,
            companies:hydrated.companies,
            users:hydrated.users,
            session:{email,name:hydrated.users.find(u=>u.email===email)?.name||email.split('@')[0],company:hydrated.targetCompany},
            mode:'login',
            note:''
          });
          writeJSON(AUTH_KEY,auth);
          if(hydrated.payload)applyCompanyState(hydrated.targetCompany,hydrated.payload);
        }else{
          const meta=su.user_metadata||{};
          const local=ensureLocalAccount(email,{
            name:meta.name||email.split('@')[0],
            role:meta.role||'admin',
            company:meta.company||'',
            companyName:meta.companyName||''
          });
          if(local){
            await sbEnsureCompany(local.company,companyName(local.company),email).catch(()=>{});
            await sbUpsertMember(local).catch(()=>{});
            setAuth({...auth,session:{email,name:local.name,company:local.company},mode:'login',note:''});
          }
        }
      }
    }catch(_){}
  }
  if(!pollTimer){
    pollTimer=setInterval(async()=>{
      if(!auth.session||!sb)return;
      try{
        await sbLoadCompanyState(currentCompany());
        if(activeSection==='chat')render();
      }catch(_){}
    },5000);
  }
  render();
}

initApp();
</script>
